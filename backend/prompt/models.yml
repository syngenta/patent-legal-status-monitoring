# Model configurations for available providers.
# Use environment variables for secrets (API keys, region, model ids).

default_provider: bedrock

providers:
  bedrock:
    service_name: bedrock-runtime
    region_env: AWS_REGION
    model_id_env: MODEL_ID
    provider: anthropic
    model_kwargs:
      max_tokens: 9000
      temperature: 0
      top_k: 250
      top_p: 1

  openai:
    model_env: OPENAI_MODEL
    api_key_env: OPENAI_API_KEY
    model_kwargs:
      temperature: 0
      max_tokens: 4096

  anthropic:
    model_env: ANTHROPIC_MODEL
    api_key_env: ANTHROPIC_API_KEY
    model_kwargs:
      temperature: 0
      max_tokens: 9000

  gemini:
    model_env: GEMINI_MODEL
    api_key_env: GOOGLE_API_KEY
    model_kwargs:
      temperature: 0
      max_output_tokens: 8192
